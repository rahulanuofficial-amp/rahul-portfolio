<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Rahul Kumar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:#020617;
color:#fff;
overflow:hidden;
}

.container{
text-align:center;
padding:40px;
}

h1{
font-size:150px;
font-weight:800;
color:#2563eb;
line-height:1;
}

h2{
font-size:36px;
margin:20px 0;
}

p{
max-width:600px;
margin:auto;
color:#94a3b8;
line-height:1.8;
margin-bottom:40px;
}

a{
display:inline-block;
padding:16px 34px;
background:#2563eb;
color:#fff;
text-decoration:none;
border-radius:50px;
transition:.3s;
font-weight:600;
}

a:hover{
transform:translateY(-5px);
}

.circle{
position:absolute;
border-radius:50%;
filter:blur(120px);
z-index:-1;
}

.circle.one{
width:350px;
height:350px;
background:#2563eb55;
top:-100px;
left:-100px;
}

.circle.two{
width:400px;
height:400px;
background:#7c3aed33;
bottom:-150px;
right:-150px;
}

</style>

</head>

<body>

<div class="circle one"></div>

<div class="circle two"></div>

<div class="container">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>

The page you are looking for doesn't exist or has been moved.

</p>

<a href="index.html">

Back To Home

</a>

</div>

</body>

</html>
